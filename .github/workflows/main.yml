name: Build Windows Exe (Python)

on:
  push:
    tags:
      - 'v*' # 当你发布以 v 开头的标签（如 v1.0.0）时，自动触发打包

jobs:
  build-windows:
    runs-on: windows-latest # 指定使用 Windows 服务器环境编译

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.14' # 替换为你项目使用的 Python 版本

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # 如果你的项目有其他依赖库，请在这里取消注释并添加：
        # pip install -r requirements.txt
        # 或者直接：pip install requests pandas (举例)

    - name: Build with PyInstaller
      run: |
        # 将 main.py 替换为你项目的启动文件名
        # --onefile 表示打包成单个独立 exe 
        # --noconsole 表示运行时不弹出黑色的 CMD 命令行窗口（如果是 GUI 软件建议加上）
        pyinstaller --onefile --noconsole main.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/main.exe # PyInstaller 默认会将生成的 exe 放在 dist 文件夹下
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
