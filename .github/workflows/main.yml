name: Build Windows Exe (Python)

on:
  push:
    tags:
      - 'v*' # 当你发布以 v 开头的标签（如 v1.0.0）时，自动触发打包

jobs:
  build-windows:
    runs-on: windows-latest # 指定使用 Windows 服务器环境编译

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.14' # 替换为你项目使用的 Python 版本

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # 如果你的项目有其他依赖库，请在这里取消注释并添加：
        # pip install -r requirements.txt
        # 或者直接：pip install requests pandas (举例)

    - name: Build with PyInstaller
      run: |
        # 进入 myrssapp 目录后再执行打包命令
        cd myrssapp
        pyinstaller --onefile --noconsole main.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        # 路径也要同步修改：因为在 myrssapp 目录下打包，生成的 dist 也在 myrssapp 里面
        files: myrssapp/dist/main.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

