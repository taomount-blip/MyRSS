name: Build Windows Exe (Python)

on:
  push:
    tags:
      - 'v*' # 当你发布以 v 开头的标签（如 v1.0.0）时，自动触发打包

jobs:
  build-windows:
    runs-on: windows-latest # 指定使用 Windows 服务器环境编译

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.14' # 替换为你项目使用的 Python 版本

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6  # 在这里顺便把 PySide6 装上
        # 如果你的 RSS 应用还用到了其他库（比如 feedparser、requests），也请一起写在后面：
        # pip install feedparser requests beautifulsoup4


    - name: Build with PyInstaller
      run: |
        # 进入 myrssapp 目录后再执行打包命令
        cd myrssapp
        pyinstaller --onefile --noconsole main.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        # 路径也要同步修改：因为在 myrssapp 目录下打包，生成的 dist 也在 myrssapp 里面
        files: myrssapp/dist/main.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
